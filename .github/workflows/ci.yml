name: CI

on:
  pull_request:
  push:
    branches:
      - master
      - main

jobs:
  checks:
    name: Check and test
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: django-insecure-ci-only
      DATABASE_URL: sqlite:///db.sqlite3

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: make venv

      - name: Run checks
        run: make check

      - name: Run tests
        run: make test
